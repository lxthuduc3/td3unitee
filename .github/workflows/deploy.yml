name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Prepare SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.USER }}@${{ secrets.HOST }}" << 'EOF'
          set -euo pipefail

          cd /root/td3unitee

          echo "Current directory:"
          pwd

          echo "Pull latest code..."
          git fetch origin
          git reset --hard origin/main

          echo "Install dependencies..."
          npm ci --force

          echo "Build project..."
          npm run build

          echo "Patch fallback CSS..."
          bash tools/modify-built-fallback-css.sh

          echo "Deploy..."
          sudo rm -rf /var/www/td3unitee
          sudo mkdir -p /var/www/td3unitee
          sudo cp -r dist/* /var/www/td3unitee/

          echo "Restart nginx..."
          sudo systemctl restart nginx

          echo "Done."
          EOF