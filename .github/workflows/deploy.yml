name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Patch fallback CSS
        run: bash tools/modify-built-fallback-css.sh

      - name: Prepare SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.HOST }}" >> ~/.ssh/known_hosts

      - name: Upload files
        run: |
          tar -C dist -czf /tmp/td3unitee-dist.tar.gz .
          scp -i ~/.ssh/deploy_key /tmp/td3unitee-dist.tar.gz "${{ secrets.USER }}@${{ secrets.HOST }}:/tmp/td3unitee-dist.tar.gz"

      - name: Activate release
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.USER }}@${{ secrets.HOST }}" << 'EOF'
          set -euo pipefail
          sudo rm -rf /var/www/td3unitee
          sudo mkdir -p /var/www/td3unitee
          sudo tar -xzf /tmp/td3unitee-dist.tar.gz -C /var/www/td3unitee
          sudo systemctl restart nginx
          rm -f /tmp/td3unitee-dist.tar.gz
          EOF
