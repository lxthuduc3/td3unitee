name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --force

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Patch fallback CSS
        run: bash tools/modify-built-fallback-css.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: td3unitee-dist
          path: dist
          if-no-files-found: error
